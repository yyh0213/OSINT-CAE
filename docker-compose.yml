services:
  collector:
    build: ./collector
    container_name: collector
    ports:
      - "5050:5050"
    env_file:
      - ./.env
    environment:
      - QDRANT_HOST=${DB_IP:-localhost}
      - OLLAMA_URL=http://${DB_IP:-localhost}:11434/api/embeddings
      - DATA_PATH=/app/data
    volumes:
      - /mnt/user/etc_archive/OSINT_REPORT/collector_data:/app/data
    networks:
      - osint-net
    restart: unless-stopped

  analyzer:
    build: ./analyzer
    container_name: analyzer
    ports:
      - "8000:8000"
    volumes:
      - /mnt/user/etc_archive/OSINT_REPORT:/app/OSINT_REPORT
    environment:
      - COLLECTOR_URL=http://collector:5050
      - TZ=Asia/Seoul
    env_file:
      - ./.env
    depends_on:
      - collector
    networks:
      - osint-net
    restart: unless-stopped

networks:
  osint-net:
    driver: bridge
